# AvatarReX 混合训练：800 Video × 3数据集 + 800 AABB × 3数据集 = 4800 samples/epoch
# seed=11 确保采样不与 test 重叠
train_dataset: 800 @ ${dataset28}(seed=11) + 800 @ ${dataset29}(seed=11) + 800 @ ${dataset32}(seed=11) + 800 @ ${dataset30}(seed=11) + 800 @ ${dataset31}(seed=11) + 800 @ ${dataset33}(seed=11)
# 测试集：100 Video × 3数据集 + 100 AABB × 3数据集 = 600 samples/epoch
# seed=33 确保与 train 不重叠，覆盖所有数据集
test_dataset: 100 @ AvatarReX_Video(split='Training', ROOT="/workspace/data/avatarrex_zzr_output", resolution=(512, 288), num_views=4, seed=33, n_corres=0) + 100 @ AvatarReX_Video(split='Training', ROOT="/workspace/data/avatarrex_lbn1_output", resolution=(512, 288), num_views=4, seed=33, n_corres=0) + 100 @ AvatarReX_Video(split='Training', ROOT="/workspace/data/avatarrex_zxc_output", resolution=(512, 288), num_views=4, seed=33, n_corres=0) + 100 @ AvatarReX_AABB(split='Training', ROOT="/workspace/data/avatarrex_zzr_output", resolution=(512, 288), num_views=4, seed=33, n_corres=0) + 100 @ AvatarReX_AABB(split='Training', ROOT="/workspace/data/avatarrex_lbn1_output", resolution=(512, 288), num_views=4, seed=33, n_corres=0) + 100 @ AvatarReX_AABB(split='Training', ROOT="/workspace/data/avatarrex_zxc_output", resolution=(512, 288), num_views=4, seed=33, n_corres=0)

seed: 0
batch_size: 8
accum_iter: 1
gradient_checkpointing: true
epochs: 40
start_epoch: 0
weight_decay: 0.05
lr: 1.0e-04
min_lr: 1.0e-06
warmup_epochs: 5
amp: 1

num_workers: 8
